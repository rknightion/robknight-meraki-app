kind: recording_rule_template
id: device-uplinks-loss-latency
group: wan
display_name: Meraki MX uplink loss + latency (history cache)
thresholds: []
rule:
  title: "Meraki WAN uplink loss + latency — <% .OrgID %>"
  data:
    - refId: A
      relativeTimeRange: { from: 60, to: 0 }
      datasourceUid: "robknight-meraki-ds"
      model:
        refId: A
        kind: deviceUplinksLossLatencyHistory
        orgId: "<% .OrgID %>"
  record:
    metric: "meraki_wan_uplink_loss_pct"
    from: A
  labels:
    managed_by: meraki-plugin
    meraki_kind: recording
    meraki_group: wan
    meraki_org: "<% .OrgID %>"
    meraki_rule: device-uplinks-loss-latency
  annotations:
    summary: "WAN uplink loss + latency recorded for Meraki org <% .OrgID %>"
    description: "Category B (rate-limit relief): Meraki's /organizations/{orgId}/devices/uplinksLossAndLatency endpoint already returns a timeseries, but a 5-minute window per call and every dashboard view pays the API cost. Recording centralises the fetch on a single evaluation interval so panels read from Prometheus instead. Series labelled by serial + uplink."
