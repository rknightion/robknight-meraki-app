kind: alert_rule_template
id: license-expiring-crit
group: lifecycle
display_name: License expiring (critical — 7 day horizon)
severity: critical
thresholds:
  - key: days_crit
    type: int
    default: 7
    label: Days-remaining threshold
    help: Fire when any license's remaining days drops below this value.
rule:
  title: "Meraki license expiring within <% .Thresholds.days_crit %> days — <% .OrgID %>"
  for: "10m"
  query:
    kind: licensesList
    params:
      orgId: "<% .OrgID %>"
  condition: "C"
  data:
    - refId: A
      relativeTimeRange: { from: 3600, to: 0 }
      datasourceUid: "robknight-meraki-ds"
      model:
        refId: A
        kind: licensesList
        orgId: "<% .OrgID %>"
    - refId: B
      relativeTimeRange: { from: 0, to: 0 }
      datasourceUid: "__expr__"
      model:
        refId: B
        type: reduce
        reducer: min
        expression: A
    - refId: C
      relativeTimeRange: { from: 0, to: 0 }
      datasourceUid: "__expr__"
      model:
        refId: C
        type: threshold
        conditions:
          - evaluator: { type: lt, params: [<% .Thresholds.days_crit %>] }
        expression: B
  annotations:
    summary: "Meraki licenses imminently expiring (critical) in org <% .OrgID %>"
    description: "One or more Meraki licenses will expire within the configured critical-horizon window. Immediate renewal required."
  labels:
    severity: critical
    meraki_group: lifecycle
    meraki_product: ""
    meraki_org: "<% .OrgID %>"
    meraki_rule: license-expiring-crit
    managed_by: meraki-plugin
